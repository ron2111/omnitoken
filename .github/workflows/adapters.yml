name: Adapter Checks

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.module }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        module:
          - adapters/anthropic
          - adapters/gemini
          - adapters/huggingface
          - adapters/llama3
          - adapters/mistral
          - adapters/oss

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'
          cache: true
          cache-dependency-path: |
            go.work.sum
            **/go.sum

      - name: Test adapter module
        working-directory: ${{ matrix.module }}
        run: go test ./...
