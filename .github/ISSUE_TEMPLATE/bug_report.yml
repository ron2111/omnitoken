name: Bug Report
description: Report incorrect behavior, crashes, or regressions.
title: "Bug: "
labels:
  - "type: bug"
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal code, command, or input that reproduces the issue.
      placeholder: |
        go test ./...
        omni count -model gpt-4o "hello world"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: OmniToken Version / Commit
      placeholder: v0.x.x or commit SHA
  - type: input
    id: go-version
    attributes:
      label: Go Version
      placeholder: go version
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - tokenizer
        - cache
        - cost
        - budget
        - cli
        - adapters
        - benchmarks
        - docs
        - unsure
  - type: textarea
    id: notes
    attributes:
      label: Additional Context
